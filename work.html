<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>태영EMC 출퇴근</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  body { background: #0f2c4d; color: #fff; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 14px; text-align: center; }
  header h1 { font-size: 28px; }
  #status { background:#08203a; color:#9be3ab; font-size:15px; padding:8px; text-align:center; min-height:34px; word-break:break-all; }
  .stage { flex: 1; position: relative; display:flex; align-items:center; justify-content:center; }
  video { width: 100%; height: 100%; object-fit: cover; }
  .frame { position:absolute; width:240px; height:240px; border:5px solid #ffffffaa; border-radius:18px; box-shadow:0 0 0 9999px rgba(15,44,77,0.5); }
  .result { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .result.show { display:flex; }
  .result.ok { background:#1e8e3e; } .result.err { background:#b3261e; }
  .result .ic { font-size:60px; } .result .nm { font-size:46px; font-weight:800; }
  .result .dp { font-size:22px; opacity:.9; } .result .gb { font-size:54px; font-weight:800; margin:6px; }
  .result .tm { font-size:22px; opacity:.9; } .result .em { font-size:26px; font-weight:700; padding:0 24px; }
</style>
</head>
<body>
  <header><h1>🏭 출퇴근</h1>
    <button id="flipBtn" style="margin-top:8px;padding:8px 18px;font-size:15px;border:none;border-radius:10px;background:#2b6cb0;color:#fff;font-weight:700;">📷 카메라 전환 (앞/뒤)</button>
  </header>
  <div id="status">시작하는 중...</div>
  <div class="stage">
    <video id="v" playsinline muted autoplay></video>
    <div class="frame"></div>
    <div class="result" id="result">
      <div class="ic" id="rIc"></div>
      <div class="dp" id="rDp"></div>
      <div class="nm" id="rNm"></div>
      <div class="gb" id="rGb"></div>
      <div class="tm" id="rTm"></div>
      <div class="em" id="rEm"></div>
    </div>
  </div>
<script>
  var BACKEND_URL = "https://script.google.com/macros/s/AKfycbysP-zZgVABrdmEFiRyxtH1QZFz_ONNRLyfLe0W9RCwimRbSZQAq0bl5pgvCfCPrsIF/exec";
  var MODE = "work";

  var statusEl = document.getElementById('status');
  function setStatus(t){ statusEl.textContent = t; }
  var video = document.getElementById('v');
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d', { willReadFrequently:true });
  var busy = false, lastData="", lastT=0, detector=null, jsQRfn=null;

  function beep(ok){ try{ var a=new (window.AudioContext||window.webkitAudioContext)(); var o=a.createOscillator(),g=a.createGain(); o.connect(g);g.connect(a.destination); o.frequency.value=ok?880:220; o.start(); g.gain.setValueAtTime(.3,a.currentTime); g.gain.exponentialRampToValueAtTime(.01,a.currentTime+.3); o.stop(a.currentTime+.3);}catch(e){} }

  function showResult(d){
    var r=document.getElementById('result');
    if(d.ok){ r.className='result show ok';
      document.getElementById('rIc').textContent='O';
      document.getElementById('rDp').textContent=d.dept||'';
      document.getElementById('rNm').textContent=d.name+'님';
      document.getElementById('rGb').textContent=d.gb||'출근';
      document.getElementById('rTm').textContent=d.time||''; document.getElementById('rEm').textContent=''; beep(true);
    } else { r.className='result show err';
      document.getElementById('rIc').textContent=d.dup?'i':'X';
      document.getElementById('rDp').textContent='';document.getElementById('rNm').textContent='';
      document.getElementById('rGb').textContent='';document.getElementById('rTm').textContent='';
      document.getElementById('rEm').textContent=d.msg||'오류'; beep(false);
    }
    setTimeout(function(){ r.className='result'; busy=false; setStatus('카드를 비춰주세요'); },2200);
  }

  function send(payload){
    busy=true; setStatus('전송 중... ('+payload+')');
    fetch(BACKEND_URL,{ method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({payload:payload, mode:MODE}) })
    .then(function(r){return r.json();}).then(function(d){ showResult(d); })
    .catch(function(e){ showResult({ok:false,msg:'전송 오류: '+e.message}); });
  }
  function onDetected(data){ var now=Date.now(); if(data===lastData && (now-lastT)<3000) return; lastData=data; lastT=now; send(data); }

  var curFacing = localStorage.getItem('camFacing') || 'environment';
  var curStream = null, started = false;

  function startCamera(facing){
    // 기존 스트림 끄기
    if(curStream){ curStream.getTracks().forEach(function(t){ t.stop(); }); }
    navigator.mediaDevices.getUserMedia({ video:{ facingMode: facing } })
      .then(function(stream){
        curStream = stream;
        video.srcObject = stream; video.play();
        curFacing = facing;
        try { localStorage.setItem('camFacing', facing); } catch(e){}
        setStatus('카메라(' + (facing==='user'?'전면':'후면') + ') 켜짐. 카드를 비춰주세요');
        if(started) return;   // 인식 루프는 한 번만 시작
        started = true;
        if ('BarcodeDetector' in window) {
          try { detector = new BarcodeDetector({ formats:['qr_code'] }); loopNative(); return; }
          catch(e){ detector=null; }
        }
        loadJsQR();
      })
      .catch(function(e){
        // 요청한 카메라가 없으면 반대쪽으로 시도
        if(facing==='user'){ setStatus('전면 카메라 없음 → 후면으로'); startCamera('environment'); }
        else { setStatus('카메라 오류: '+e.message); }
      });
  }

  document.getElementById('flipBtn').addEventListener('click', function(){
    startCamera(curFacing === 'user' ? 'environment' : 'user');
  });

  startCamera(curFacing);

  function loopNative(){
    if(!busy && video.readyState>=2){
      detector.detect(video).then(function(codes){ if(codes && codes.length){ setStatus('인식: '+codes[0].rawValue); onDetected(codes[0].rawValue); } }).catch(function(e){});
    }
    setTimeout(loopNative, 400);
  }
  function loadJsQR(){
    var s=document.createElement('script'); s.src='jsQR.js';
    s.onload=function(){ jsQRfn=window.jsQR; setStatus('jsQR 준비됨. 카드를 비춰주세요'); loopJsQR(); };
    s.onerror=function(){ setStatus('jsQR 로드 실패'); };
    document.head.appendChild(s);
  }
  function loopJsQR(){
    if(jsQRfn && !busy && video.readyState>=2 && video.videoWidth>0){
      canvas.width=video.videoWidth; canvas.height=video.videoHeight;
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      var img=ctx.getImageData(0,0,canvas.width,canvas.height);
      var code=jsQRfn(img.data,img.width,img.height);
      if(code && code.data){ setStatus('인식: '+code.data); onDetected(code.data); }
      else { setStatus('카드를 비춰주세요 (영상 '+canvas.width+'x'+canvas.height+')'); }
    }
    requestAnimationFrame(loopJsQR);
  }
</script>
</body>
</html>

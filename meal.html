<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>태영EMC 식당 출입</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  body { background: #0f2c4d; color: #fff; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 18px; text-align: center; }
  header h1 { font-size: 30px; letter-spacing: -0.5px; }
  header .sub { color: #9bb8d6; font-size: 16px; margin-top: 4px; }
  .stage { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
  video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  canvas { display: none; }
  .frame { position: absolute; width: 260px; height: 260px; border: 5px solid #ffffffaa; border-radius: 20px; box-shadow: 0 0 0 9999px rgba(15,44,77,0.55); }
  .hint { position: absolute; bottom: 26px; left: 0; right: 0; text-align: center; font-size: 20px; color: #cfe0f2; }
  /* 결과 오버레이 */
  .result { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .result.show { display: flex; }
  .result.ok   { background: #1e8e3e; }
  .result.err  { background: #b3261e; }
  .result .big { font-size: 64px; font-weight: 800; margin: 8px 0; }
  .result .nm  { font-size: 48px; font-weight: 800; }
  .result .dp  { font-size: 24px; opacity: 0.9; margin-bottom: 6px; }
  .result .tm  { font-size: 24px; opacity: 0.9; margin-top: 10px; }
  .err-msg { font-size: 30px; font-weight: 700; padding: 0 30px; text-align: center; }
</style>
</head>
<body>
  <header>
    <h1>🍚 식당 출입</h1>
    <div class="sub">QR 카드를 화면에 비춰주세요</div>
  </header>
  <div class="stage">
    <video id="v" playsinline muted></video>
    <div class="frame" id="frame"></div>
    <div class="hint" id="hint">카메라를 켜는 중...</div>
    <div class="result" id="result">
      <div class="big" id="rIcon">✓</div>
      <div class="dp" id="rDept"></div>
      <div class="nm" id="rName"></div>
      <div class="big" id="rGb">입장</div>
      <div class="tm" id="rTime"></div>
      <div class="err-msg" id="rErr"></div>
    </div>
  </div>

<script>
  // ====== 설정 ======
  var BACKEND_URL = "https://script.google.com/macros/s/AKfycbysP-zZgVABrdmEFiRyxtH1QZFz_ONNRLyfLe0W9RCwimRbSZQAq0bl5pgvCfCPrsIF/exec";  // Apps Script /exec 주소
  var MODE = "meal";                              // 식당용
  // ==================

  var video = document.getElementById('v');
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d', { willReadFrequently: true });
  var hint = document.getElementById('hint');
  var resultEl = document.getElementById('result');
  var busy = false;          // 처리 중 잠금
  var lastPayload = "";      // 직전 읽은 카드
  var lastTime = 0;

  function beep(ok) {
    try {
      var ac = new (window.AudioContext || window.webkitAudioContext)();
      var o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = ok ? 880 : 220;
      o.start(); g.gain.setValueAtTime(0.3, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.3);
      o.stop(ac.currentTime + 0.3);
    } catch (e) {}
  }

  function showResult(data) {
    var r = resultEl;
    if (data.ok) {
      r.className = 'result show ok';
      document.getElementById('rIcon').textContent = '✓';
      document.getElementById('rDept').textContent = data.dept || '';
      document.getElementById('rName').textContent = data.name + '님';
      document.getElementById('rGb').textContent = (data.gb || '입장');
      document.getElementById('rTime').textContent = data.time || '';
      document.getElementById('rErr').textContent = '';
      beep(true);
    } else {
      r.className = 'result show err';
      document.getElementById('rIcon').textContent = data.dup ? 'ⓘ' : '✕';
      document.getElementById('rDept').textContent = '';
      document.getElementById('rName').textContent = '';
      document.getElementById('rGb').textContent = '';
      document.getElementById('rTime').textContent = '';
      document.getElementById('rErr').textContent = data.msg || '오류';
      beep(false);
    }
    setTimeout(function(){ r.className = 'result'; busy = false; }, 2200);
  }

  function send(payload) {
    busy = true;
    hint.textContent = '처리 중...';
    fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ payload: payload, mode: MODE })
    })
    .then(function(res){ return res.json(); })
    .then(function(data){ hint.textContent = 'QR 카드를 화면에 비춰주세요'; showResult(data); })
    .catch(function(err){ hint.textContent = ''; showResult({ ok:false, msg:'전송 오류. 인터넷 확인' }); });
  }

  function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA && !busy) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      var img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
      if (code && code.data) {
        var now = Date.now();
        // 같은 카드 3초 내 재인식 방지 (화면단)
        if (code.data === lastPayload && (now - lastTime) < 3000) {
          // skip
        } else {
          lastPayload = code.data; lastTime = now;
          send(code.data);
        }
      }
    }
    requestAnimationFrame(tick);
  }

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(function(stream){
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      video.play();
      hint.textContent = 'QR 카드를 화면에 비춰주세요';
      requestAnimationFrame(tick);
    })
    .catch(function(err){
      hint.textContent = '카메라를 켤 수 없습니다. 권한을 허용해 주세요.';
    });
</script>
</body>
</html>
